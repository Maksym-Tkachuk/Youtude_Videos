<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TikTok Authorization</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0d1120; color: #e8e8e8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #1a2235; border-radius: 12px; padding: 2.5rem; max-width: 480px; text-align: center; }
    h1 { color: #ffd60a; font-size: 1.4rem; margin-top: 0; }
    .code { background: #080c14; border: 1px solid #2a3a55; border-radius: 8px; padding: 1rem; font-family: monospace; font-size: 1.1rem; word-break: break-all; color: #ffd60a; margin: 1.5rem 0; cursor: pointer; }
    .hint { color: #86a6c8; font-size: 0.9rem; }
    .copied { color: #4ade80; }
    .error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1>TikTok Authorization</h1>
    <div id="content"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const error = params.get('error');
    const el = document.getElementById('content');

    if (error) {
      el.innerHTML = `<p class="error">Authorization failed: ${error}</p><p class="hint">${params.get('error_description') || 'Try again.'}</p>`;
    } else if (code) {
      el.innerHTML = `<p>Copy this code and paste it into Claude Code:</p><div class="code" id="code" onclick="copyCode()">${code}</div><p class="hint" id="hint">Click the code to copy</p>`;
    } else {
      el.innerHTML = '<p class="error">No authorization code received.</p>';
    }

    function copyCode() {
      navigator.clipboard.writeText(code).then(() => {
        document.getElementById('hint').textContent = 'Copied!';
        document.getElementById('hint').className = 'copied';
      });
    }
  </script>
</body>
</html>
